name: metroswap
description: "Sistema de intercambio de material académico."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.0.3
  google_sign_in: ^6.2.1
  firebase_storage: ^13.0.6
  image_picker: ^1.2.1
  paypal_sdk: ^1.0.11
  collection: ^1.18.0
  url_launcher: ^6.2.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_metroswap.png
    - assets/images/fondo_estudiantes.jpg
    - assets/images/logo_grande.png
